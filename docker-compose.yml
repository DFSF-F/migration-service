services:
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: ./infra/airflow
    container_name: airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airflow-postgres/${POSTGRES_DB}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./secrets:/opt/airflow/secrets:ro
    depends_on:
      airflow-postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
          --lastname ${AIRFLOW_ADMIN_LASTNAME} \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL}

  airflow-webserver:
    build:
      context: ./infra/airflow
    container_name: airflow-webserver
    env_file:
      - .env
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airflow-postgres/${POSTGRES_DB}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./secrets:/opt/airflow/secrets:ro
      - ./scripts:/opt/airflow/project/scripts
      - ./infra/greenplum/init:/opt/airflow/project/sql:ro
    ports:
      - "8080:8080"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver

  airflow-scheduler:
    build:
      context: ./infra/airflow
    container_name: airflow-scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airflow-postgres/${POSTGRES_DB}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./secrets:/opt/airflow/secrets:ro
      - ./scripts:/opt/airflow/project/scripts
      - ./infra/greenplum/init:/opt/airflow/project/sql:ro
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  greenplum:
    image: ionxwood/greenplum:6.21.0
    container_name: greenplum
    hostname: greenplum
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      GP_DB: ${GREENPLUM_DB}
      GP_USER: ${GREENPLUM_USER}
      GP_PASSWORD: ${GREENPLUM_PASSWORD}
      TZ: Europe/Moscow
    volumes:
      - greenplum-data:/srv
      - ./scripts/data_gen/output:/data/input:ro

volumes:
  airflow-postgres-data:
  greenplum-data: